<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrador</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/src/index.css">
  <style>
    :root { --primary: #F27D26; }
    body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
    .admin-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body>

  <div class="min-h-screen flex flex-col lg:flex-row">
    
    <!-- Admin Sidebar -->
    <aside class="w-full lg:w-64 bg-white border-r border-gray-200 p-6 space-y-8">
      <div class="flex items-center gap-2 mb-8">
        <i class="fas fa-user-shield text-primary text-2xl"></i>
        <h1 class="text-xl font-black italic">PAINEL ADM</h1>
      </div>

      <nav class="space-y-2">
        <button data-tab="settings" class="tab-btn w-full text-left px-4 py-3 rounded-xl font-medium transition-colors bg-primary text-white">
          <i class="fas fa-cog mr-2"></i> Configurações
        </button>
        <button data-tab="categories" class="tab-btn w-full text-left px-4 py-3 rounded-xl font-medium transition-colors hover:bg-gray-100">
          <i class="fas fa-tags mr-2"></i> Categorias
        </button>
        <button data-tab="products" class="tab-btn w-full text-left px-4 py-3 rounded-xl font-medium transition-colors hover:bg-gray-100">
          <i class="fas fa-box mr-2"></i> Produtos
        </button>
        <h3>Importar produto por link</h3>

        <input type="text" id="productLink" placeholder="Cole o link do produto">

        <button onclick="importarProduto()">Importar Produto</button>I
        </button>
        <button data-tab="videos" class="tab-btn w-full text-left px-4 py-3 rounded-xl font-medium transition-colors hover:bg-gray-100">
          <i class="fas fa-video mr-2"></i> Vídeos
        </button>
        <a href="index.html" class="block w-full text-left px-4 py-3 rounded-xl font-medium transition-colors hover:bg-gray-100 text-red-500">
          <i class="fas fa-sign-out-alt mr-2"></i> Sair
        </a>
      </nav>
    </aside>

    <!-- Admin Content -->
    <main class="flex-1 p-6 lg:p-12 overflow-y-auto">
      
      <!-- Settings Tab -->
      <div id="settings-tab" class="tab-content space-y-8">
        <h2 class="text-3xl font-black">Configurações Gerais</h2>
        
        <form id="settings-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="admin-card space-y-4">
            <h3 class="font-bold border-b pb-2">Identidade</h3>
            <div>
              <label class="block text-sm font-medium text-gray-700">Nome da Loja</label>
              <input type="text" name="name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Cor Primária</label>
              <input type="color" name="primaryColor" class="mt-1 block w-full h-10 border-gray-300 rounded-md">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Nova Senha ADM</label>
              <input type="password" name="newPassword" placeholder="Deixe em branco para manter" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
            </div>
          </div>

          <div class="admin-card space-y-4">
            <h3 class="font-bold border-b pb-2">Banner Principal</h3>
            <div>
              <label class="block text-sm font-medium text-gray-700">Imagem do Banner (URL)</label>
              <input type="text" name="bannerImage" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Título do Banner</label>
              <input type="text" name="bannerTitle" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Subtítulo do Banner</label>
              <input type="text" name="bannerSubtitle" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Cor do Texto</label>
              <input type="color" name="bannerTextColor" class="mt-1 block w-full h-10 border-gray-300 rounded-md">
            </div>
          </div>

          <div class="admin-card space-y-4 md:col-span-2">
            <h3 class="font-bold border-b pb-2">Redes Sociais</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Instagram (Link)</label>
                <input type="text" name="instagram" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">WhatsApp (Número)</label>
                <input type="text" name="whatsapp" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Facebook (Link)</label>
                <input type="text" name="facebook" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
              </div>
            </div>
          </div>

          <div class="md:col-span-2">
            <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg shadow-primary/20 hover:opacity-90">
              SALVAR TODAS AS CONFIGURAÇÕES
            </button>
          </div>
        </form>
      </div>

      <!-- Categories Tab -->
      <div id="categories-tab" class="tab-content hidden space-y-8">
        <h2 class="text-3xl font-black">Gerenciar Categorias</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="admin-card">
            <h3 class="font-bold mb-4">Nova Categoria</h3>
            <form id="category-form" class="space-y-4">
              <input type="text" name="catName" placeholder="Nome da Categoria" class="block w-full border-gray-300 rounded-md shadow-sm">
              <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg font-bold">ADICIONAR</button>
            </form>
          </div>
          <div class="admin-card">
            <h3 class="font-bold mb-4">Lista de Categorias</h3>
            <div id="admin-categories-list" class="space-y-2">
              <!-- Categories list -->
            </div>
          </div>
        </div>
      </div>

      <!-- Products Tab -->
      <div id="products-tab" class="tab-content hidden space-y-8">
        <h2 class="text-3xl font-black">Gerenciar Produtos</h2>
        <div id="admin-products-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Products list -->
        </div>
      </div>

      <!-- Import Tab -->
      <div id="import-tab" class="tab-content hidden space-y-8">
        <h2 class="text-3xl font-black">Importar do Mercado Livre</h2>
        <div class="admin-card max-w-xl">
          <form id="import-form" class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700">O que deseja buscar?</label>
              <input type="text" name="importQuery" placeholder="Ex: iPhone 15, Tênis Nike..." class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Quantidade (Máx 10)</label>
              <input type="number" name="importCount" value="10" max="10" min="1" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg shadow-primary/20">
              IMPORTAR PRODUTOS
            </button>
          </form>
        </div>
      </div>

      <!-- Videos Tab -->
      <div id="videos-tab" class="tab-content hidden space-y-8">
        <h2 class="text-3xl font-black">Vídeos de Produtos</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="admin-card">
            <h3 class="font-bold mb-4">Novo Vídeo</h3>
            <form id="video-form" class="space-y-4">
              <input type="text" name="videoTitle" placeholder="Título do Vídeo" class="block w-full border-gray-300 rounded-md shadow-sm">
              <input type="text" name="videoLink" placeholder="Link do YouTube" class="block w-full border-gray-300 rounded-md shadow-sm">
              <textarea name="videoDesc" placeholder="Descrição" class="block w-full border-gray-300 rounded-md shadow-sm"></textarea>
              <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg font-bold">ADICIONAR VÍDEO</button>
            </form>
          </div>
          <div class="admin-card">
            <h3 class="font-bold mb-4">Vídeos Cadastrados</h3>
            <div id="admin-videos-list" class="space-y-2">
              <!-- Videos list -->
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="/src/admin.js"></script>
<script>

function importarProduto(){

const link = document.getElementById("productLink").value;

if(!link){
alert("Cole o link do produto");
return;
}

const produto = {
name: "Produto do Mercado Livre",
price: "Ver preço no site",
image: "https://via.placeholder.com/300",
link: link
};

console.log(produto);

alert("Produto criado!");

}

</script>
</body>
</html>
